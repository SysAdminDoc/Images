name: Security

on:
  push:
    branches: [ main ]
    paths:
      - "**/*.csproj"
      - "**/*.sln"
      - "**/packages.lock.json"
      - ".github/workflows/security.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "**/*.csproj"
      - "**/*.sln"
      - "**/packages.lock.json"
  schedule:
    # Daily at 09:00 UTC. Catches advisories that land on already-pinned packages
    # without anyone touching the project files.
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vulnerable-packages:
    name: dotnet list package --vulnerable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Images.sln

      # Per ROADMAP item 34: dependency/CVE CI gate. Runs the same scan that the
      # local Definition-of-Done expects ahead of release. Job fails when ANY
      # package in the resolved graph (direct or transitive) has a known CVE.
      - name: Scan for vulnerable NuGet packages
        shell: pwsh
        run: |
          $output = dotnet list Images.sln package --vulnerable --include-transitive 2>&1 | Out-String
          Write-Host $output
          if ($output -match "has the following vulnerable packages") {
              Write-Error "Vulnerable packages detected — see output above."
              exit 1
          }
          if ($output -notmatch "no vulnerable packages") {
              Write-Error "Unexpected vulnerable-package scan output."
              exit 1
          }
          Write-Host "Vulnerable-package scan: clean."

      # S-11 transitive-dep pinning audit (ROADMAP Security).
      # Logs the full resolved dependency tree (direct + transitive) so
      # reviewers can verify pinning depth. Today Images relies on WIC +
      # Store extensions for HEIC/AVIF/JXL — no bundled native decoders —
      # so the NuGet transitive graph is the primary attack surface.
      #
      # When S-09 native decoder bundling lands (libheif, libavif, libwebp,
      # libjxl), this step must be extended to verify version floors for
      # their own transitive C deps:
      #   - libde265  (under libheif)       — floor TBD per advisory stream
      #   - aom       (under libheif-AV1)   — floor TBD
      #   - LittleCMS (under most decoders) — floor TBD
      # Until then, `dotnet list --include-transitive` above the CVE gate
      # already walks the NuGet transitive tree for known vulnerabilities.
      - name: Log full transitive dependency tree
        shell: pwsh
        run: |
          $tree = dotnet list Images.sln package --include-transitive 2>&1 | Out-String
          Write-Host $tree
          New-Item -ItemType Directory -Path transitive-deps -Force | Out-Null
          $tree | Set-Content -Path transitive-deps\nuget-transitive-tree.txt -Encoding utf8

      - name: Upload transitive dependency tree
        uses: actions/upload-artifact@v4
        with:
          name: nuget-transitive-tree
          path: transitive-deps/nuget-transitive-tree.txt
          if-no-files-found: warn
