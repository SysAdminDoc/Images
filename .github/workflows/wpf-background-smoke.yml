name: WPF background smoke

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  background-smoke:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore locked dependencies
        shell: pwsh
        run: dotnet restore Images.sln --locked-mode

      - name: Run offscreen non-activating smoke
        shell: pwsh
        run: ./scripts/Test-WpfBackgroundSmoke.ps1

      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wpf-background-smoke-results
          path: artifacts/wpf-background-smoke
          if-no-files-found: ignore
