name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.1.0)"
        required: true
      ghostscript_bundle_url:
        description: "Optional URL to an approved Ghostscript runtime zip to bundle"
        required: false
        default: ""
      ghostscript_bundle_sha256:
        description: "Required SHA-256 for ghostscript_bundle_url"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Images.sln

      - name: Validate release readiness
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts\Test-ReleaseReadiness.ps1 -Version "${{ github.event.inputs.version }}"

      # ROADMAP item 34: refuse to ship a release that depends on a NuGet
      # package with a known CVE. Mirrors the standalone Security workflow but
      # gates the actual upload — every published artifact is provably scanned.
      - name: Vulnerable package gate
        shell: pwsh
        run: |
          $output = dotnet list Images.sln package --vulnerable --include-transitive 2>&1 | Out-String
          Write-Host $output
          if ($output -match "has the following vulnerable packages") {
              Write-Error "Vulnerable packages detected — refusing to publish."
              exit 1
          }
          if ($output -notmatch "no vulnerable packages") {
              Write-Error "Unexpected vulnerable-package scan output."
              exit 1
          }

      # S-11 transitive-dep pinning: log the full resolved tree so the
      # release artifact set includes an auditable NuGet dependency snapshot.
      # When S-09 native decoder bundling lands, extend to verify version
      # floors for transitive C deps (libde265, aom, LittleCMS, etc.).
      - name: Log full transitive dependency tree
        shell: pwsh
        run: |
          $tree = dotnet list Images.sln package --include-transitive 2>&1 | Out-String
          Write-Host $tree
          New-Item -ItemType Directory -Path transitive-deps -Force | Out-Null
          $tree | Set-Content -Path transitive-deps\nuget-transitive-tree.txt -Encoding utf8

      - name: Upload release transitive dependency tree
        uses: actions/upload-artifact@v4
        with:
          name: nuget-transitive-tree-${{ github.event.inputs.version }}
          path: transitive-deps/nuget-transitive-tree.txt
          if-no-files-found: warn

      - name: Build
        run: dotnet build Images.sln -c Release --no-restore

      - name: Bundle Ghostscript runtime (optional)
        if: ${{ github.event.inputs.ghostscript_bundle_url != '' }}
        shell: pwsh
        run: |
          $url = "${{ github.event.inputs.ghostscript_bundle_url }}"
          $expectedHash = "${{ github.event.inputs.ghostscript_bundle_sha256 }}".Trim()
          $uri = [System.Uri]::new($url)
          if ($uri.Scheme -ne "https") {
            throw "ghostscript_bundle_url must use HTTPS."
          }
          if ([string]::IsNullOrWhiteSpace($expectedHash)) {
            throw "ghostscript_bundle_sha256 is required when ghostscript_bundle_url is provided."
          }
          if ($expectedHash -notmatch '^[A-Fa-f0-9]{64}$') {
            throw "ghostscript_bundle_sha256 must be a 64-character SHA-256 hex digest."
          }
          New-Item -ItemType Directory -Path codec-artifacts -Force | Out-Null
          $archive = "codec-artifacts\ghostscript.zip"
          Invoke-WebRequest -Uri $url -OutFile $archive
          $actualHash = (Get-FileHash -Path $archive -Algorithm SHA256).Hash
          if ($actualHash -ine $expectedHash) {
            throw "Ghostscript archive SHA-256 mismatch. Expected $expectedHash, got $actualHash."
          }
          Expand-Archive -Path $archive -DestinationPath "codec-artifacts\ghostscript" -Force

          $dll = Get-ChildItem -Path "codec-artifacts\ghostscript" -Recurse -Include gsdll64.dll,gsdll32.dll |
            Select-Object -First 1
          if (-not $dll) { throw "Ghostscript archive did not contain gsdll64.dll or gsdll32.dll" }

          $source = $dll.Directory.FullName
          $parent = $dll.Directory.Parent
          if ($parent -and (Test-Path -LiteralPath (Join-Path $parent.FullName "bin"))) {
            $source = $parent.FullName
          }

          pwsh -NoProfile -ExecutionPolicy RemoteSigned -File scripts\Prepare-GhostscriptBundle.ps1 -Source $source -Force

      - name: Bundle jpegtran runtime
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy RemoteSigned -File scripts\Prepare-JpegTranBundle.ps1 -Force

      - name: Publish (self-contained, win-x64)
        run: >
          dotnet publish src/Images
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=false
          -p:Version=${{ github.event.inputs.version }}
          -o publish

      - name: Smoke portable diagnostics
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy RemoteSigned -File scripts\Test-ReleaseDiagnostics.ps1 `
            -PortableDir publish `
            -RequireGhostscript `
            -RequireJpegTran

      - name: Package portable zip
        shell: pwsh
        run: |
          $zip = "Images-v${{ github.event.inputs.version }}-win-x64.zip"
          Get-ChildItem -Path publish -Filter *.pdb -Recurse | Remove-Item -Force
          Compress-Archive -Path publish\* -DestinationPath $zip -Force
          "ZIP=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      # Inno Setup 6 ships pre-installed on the `windows-latest` runner image
      # (updated whenever the image is re-baked). If it ever disappears the
      # `choco install innosetup -y` line is the one-liner fallback.
      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Host "Inno Setup not found at $iscc — installing via choco."
            choco install innosetup -y --no-progress
          }
          & $iscc "/DMyAppVersion=${{ github.event.inputs.version }}" installer\Images.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }
          $setup = "installer\output\Images-v${{ github.event.inputs.version }}-setup-win-x64.exe"
          if (-not (Test-Path $setup)) { throw "Installer not produced at $setup" }
          "SETUP=$setup" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Smoke installed diagnostics
        shell: pwsh
        run: |
          $installDir = Join-Path $PWD "installed-smoke"
          if (Test-Path -LiteralPath $installDir) {
            Remove-Item -LiteralPath $installDir -Recurse -Force
          }
          & $env:SETUP /VERYSILENT /SUPPRESSMSGBOXES /NORESTART "/DIR=$installDir" /SKIPOCR
          if ($LASTEXITCODE -ne 0) { throw "Installer smoke install failed with exit code $LASTEXITCODE" }
          try {
            pwsh -NoProfile -ExecutionPolicy RemoteSigned -File scripts\Test-ReleaseDiagnostics.ps1 `
              -InstalledDir $installDir `
              -RequireGhostscript `
              -RequireJpegTran
          }
          finally {
            $uninstaller = Get-ChildItem -LiteralPath $installDir -Filter "unins*.exe" -ErrorAction SilentlyContinue |
              Select-Object -First 1
            if ($uninstaller) {
              & $uninstaller.FullName /VERYSILENT /SUPPRESSMSGBOXES /NORESTART
            }
          }

      - name: Upload release diagnostics logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-diagnostics-${{ github.event.inputs.version }}
          path: release-diagnostics/**
          if-no-files-found: ignore

      - name: Generate checksums
        shell: pwsh
        run: |
          $checksum = "Images-v${{ github.event.inputs.version }}-checksums.txt"
          Get-FileHash -Path $env:ZIP, $env:SETUP -Algorithm SHA256 |
            ForEach-Object { "{0}  {1}" -f $_.Hash.ToLowerInvariant(), (Split-Path $_.Path -Leaf) } |
            Set-Content -Path $checksum -Encoding ascii
          "CHECKSUM=$checksum" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Generate package manifests
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy RemoteSigned -File scripts\New-PackageManifests.ps1 `
            -Version "${{ github.event.inputs.version }}" `
            -ChecksumFile $env:CHECKSUM

      - name: Upload package manifests
        uses: actions/upload-artifact@v4
        with:
          name: package-manifests-${{ github.event.inputs.version }}
          path: packaging/output/**

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "v${{ github.event.inputs.version }}"
          $exists = gh release view $tag 2>$null
          if (-not $exists) {
            gh release create $tag --title $tag --notes "Images $tag"
          }
          gh release upload $tag $env:ZIP --clobber
          gh release upload $tag $env:SETUP --clobber
          gh release upload $tag $env:CHECKSUM --clobber
